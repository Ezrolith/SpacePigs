<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a1a4a"/>
      <stop offset="100%" stop-color="#0a0a2a"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="80" cy="60" r="2" fill="#fff" opacity="0.7"/>
  <circle cx="420" cy="90" r="2.5" fill="#fff" opacity="0.6"/>
  <circle cx="150" cy="140" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="360" cy="50" r="2" fill="#fff" opacity="0.8"/>
  <circle cx="50" cy="200" r="1.5" fill="#fff" opacity="0.4"/>
  <circle cx="460" cy="180" r="2" fill="#fff" opacity="0.6"/>
  <!-- Pig face -->
  <circle cx="256" cy="270" r="120" fill="#f5a0b8"/>
  <!-- Ears -->
  <ellipse cx="160" cy="170" rx="35" ry="45" fill="#e88da5" transform="rotate(-15 160 170)"/>
  <ellipse cx="160" cy="170" rx="20" ry="30" fill="#f5a0b8" transform="rotate(-15 160 170)"/>
  <ellipse cx="352" cy="170" rx="35" ry="45" fill="#e88da5" transform="rotate(15 352 170)"/>
  <ellipse cx="352" cy="170" rx="20" ry="30" fill="#f5a0b8" transform="rotate(15 352 170)"/>
  <!-- Snout -->
  <ellipse cx="256" cy="300" rx="50" ry="35" fill="#e88da5"/>
  <circle cx="238" cy="300" r="10" fill="#c06080"/>
  <circle cx="274" cy="300" r="10" fill="#c06080"/>
  <!-- Eyes -->
  <circle cx="210" cy="240" r="18" fill="#2a1520"/>
  <circle cx="302" cy="240" r="18" fill="#2a1520"/>
  <circle cx="215" cy="234" r="6" fill="#fff"/>
  <circle cx="307" cy="234" r="6" fill="#fff"/>
  <!-- Space helmet (glass dome) -->
  <ellipse cx="256" cy="250" rx="140" ry="150" fill="none" stroke="#88ccff" stroke-width="4" opacity="0.4"/>
  <path d="M130 310 Q130 120 256 100 Q382 120 382 310" fill="none" stroke="#aaddff" stroke-width="3" opacity="0.3"/>
  <!-- Rocket flames at bottom -->
  <polygon points="200,420 220,390 240,430 260,385 280,430 300,390 320,420" fill="#ff6633" opacity="0.8"/>
  <polygon points="215,415 230,395 250,420 265,390 285,420 295,395 310,415" fill="#ffcc33" opacity="0.7"/>
  <!-- SPACE PIGS text -->
  <text x="256" y="470" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="42" fill="#f5a0b8" letter-spacing="4">SPACE PIGS</text>
</svg>
